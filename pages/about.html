  <body>
    <div class="wrapper">
      <header>
        <div class="logo">
          <a href="../index.html" class="logo-link">
            <img
              src="../logo/logo.png"
              alt="Traveler - Explore the World"
              class="logo-img"
            />
          </a>
        </div>

        <nav>
          <ul class="nav-ul">
            <li class="nav-li">
              <a class="nav-link" href="../index.html">Home</a>
            </li>
            <li class="nav-li">
              <a class="nav-link" href="destination.html">Destination</a>
            </li>
            <li class="nav-li">
              <a class="nav-link" href="about.html">About Us</a>
            </li>
            <li class="nav-li">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
          </ul>
          <button id="hamburger" aria-label="Toggle Navigation Menu">
            <span class="bar"></span>
          </button>
        </nav>
      </header>
      <main>
        <section class="about">
          <figure>
            <img
              class="agency-pic"
              src="../img/travelagency-building.jpg"
              alt="travel agency building"
            />
            <figcaption class="right">
              <p class="travel-ageny-info">
                Welcome to Traveler, where we redefine your journey with
                unparalleled services that go beyond the ordinary. Our mission
                is to curate exceptional travel experiences, crafting adventures
                that linger in your memories. At Traveler, we offer a spectrum
                of services tailored to meet every traveler's unique needs. From
                seamless itinerary planning to personalized concierge services,
                we provide a suite of solutions designed to enhance your
                journey. Embrace the art of exploration, and let Traveler be
                your compass in discovering the world's wonders.
              </p>
            </figcaption>
          </figure>

          <figure>
            <img
              class="employee-pic"
              src="../img/travel-employee.jpg"
              alt="employee picture"
            />
            <figcaption class="left">
              <p class="employee-info">
                "At Traveler, our dedicated team of professionals works
                tirelessly to ensure that your travel experiences are nothing
                short of extraordinary. Meet our passionate staff, including
                Sarah Thompson, our seasoned Travel Consultant, who specializes
                in curating bespoke itineraries tailored to your preferences.
                John Rodriguez, our Customer Service Specialist, is always ready
                to assist you with a warm smile and a wealth of travel
                knowledge. Behind the scenes, Emily Turner, our meticulous
                Operations Coordinator, ensures that every detail of your
                journey is seamlessly executed. Together, the Traveler team is
                committed to making your travel dreams a reality, providing
                top-notch service that goes beyond expectations."
              </p>
            </figcaption>
          </figure>
        </section>
      </main>

      <footer>
        <div class="social-media">
          <i class="fab fa-facebook-square"></i>
          <i class="fab fa-twitter"></i>
          <i class="fab fa-instagram-square"></i>
        </div>
        <div class="contact-info">
          <p>Email: info@traveler.com</p>
          <p>Phone: +1 (555) 123-4567</p>
        </div>
        <nav class="footer-nav">
