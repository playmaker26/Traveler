<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Traveler" />
    <meta
      property="og:description"
      content="Discover extraordinary travel experiences with Travelers. Our travel agency is dedicated to creating unforgettable journeys..."
    />
    <meta property="og:image" content="url_to_your_featured_image.jpg" />
    <meta property="og:url" content="your_website_url" />

    <title>Payment page</title>
  </head>

  <body>
    <div class="wrapper">
      <header>
        <div class="logo">
          <a href="../index.html" class="logo-link">
            <img
              src="../logo/logo.png"
              alt="Traveler - Explore the World"
              class="logo-img"
            />
          </a>
        </div>

        <nav>
          <ul class="nav-ul">
            <li class="nav-li">
              <a class="nav-link" href="../index.html">Home</a>
            </li>
            <li class="nav-li">
              <a class="nav-link" href="destination.html">Destination</a>
            </li>
            <li class="nav-li">
              <a class="nav-link" href="about.html">About Us</a>
            </li>
            <li class="nav-li">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
          </ul>
          <button id="hamburger" aria-label="Toggle Navigation Menu">
            <span class="bar"></span>
          </button>
        </nav>
      </header>
      <main>
        <section class="pay">
          <form action="" method="" class="payment">
            <div class="payment-group">
              <label for="itemType">Select Item Type:</label>
              <select id="itemType" name="itemType" required>
                <option value="none">None</option>
                <option value="clothing">Clothing</option>
                <option value="electronics">Electronics</option>
                <option value="accessories">Accessories</option>
              </select>
            </div>

            <div class="payment-group">
              <label for="country">Pick your destination</label>
              <select name="country" id="country">
                <option value="none">None</option>
                <option value="Australia">Australia</option>
                <option value="Brazil">Brazil</option>
                <option value="Canada">Canada</option>
                <option value="France">France</option>
                <option value="Greece">Greece</option>
                <option value="Iceland">Iceland</option>
                <option value="India">India</option>
                <option value="Italy">Italy</option>
                <option value="Japan">Japan</option>
                <option value="Mexico">Mexico</option>
                <option value="Morocco">Morocco</option>
                <option value="New Zealand">New Zealand</option>
                <option value="Peru">Peru</option>
                <option value="Portugal">Portugal</option>
                <option value="South Africa">South Africa</option>
                <option value="Spain">Spain</option>
                <option value="Switzerland">Switzerland</option>
                <option value="Thailand">Thailand</option>
                <option value="United States">United States</option>
                <option value="Vietnam">Vietnam</option>
              </select>
            </div>

            <div class="payment-group">
              <label for="quantity">Number of Travelers:</label>
              <input type="number" id="quantity" name="quantity" required />
            </div>

            <div class="payment-group">
              <label for="travelDate">Travel Date:</label>
              <input type="date" id="travelDate" name="travelDate" required />
            </div>

            <div class="payment-group">
              <button type="button" onclick="calculatePrice()">
                Calculate Price
              </button>
            </div>

            <div class="payment-group">
              <label for="totalPrice">Total Price:</label>
              <span id="totalPrice">$0.00</span>
            </div>
          </form>
        </section>
      </main>

      <footer>
        <div class="social-media">
          <i class="fab fa-facebook-square"></i>
          <i class="fab fa-twitter"></i>
          <i class="fab fa-instagram-square"></i>
        </div>
        <div class="contact-info">
          <p>Email: info@traveler.com</p>
          <p>Phone: +1 (555) 123-4567</p>
        </div>
        <nav class="footer-nav">
          <ul class="footer-ul">
            <li class="footer-li">
              <a class="footer-link" href="#">Terms of Service</a>
            </li>
            <li class="footer-li">
              <a class="footer-link" href="#">Privacy Policy</a>
            </li>
            <li class="footer-li"><a class="footer-link" href="#">FAQs</a></li>
          </ul>
        </nav>
      </footer>
      <script src="../js/script.js"></script>
    </div>
  </body>
</html>
