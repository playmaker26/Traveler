<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Traveler" />
    <meta
      property="og:description"
      content="Discover extraordinary travel experiences with Travelers. Our travel agency is dedicated to creating unforgettable journeys..."
    />
    <meta property="og:image" content="url_to_your_featured_image.jpg" />
    <meta property="og:url" content="your_website_url" />

    <title>Contact page</title>
  </head>

  <body>
    <div class="wrapper">
      <header>
        <div class="logo">
          <a href="../index.html" class="logo-link">
            <img
              src="../logo/logo.png"
              alt="Traveler - Explore the World"
              class="logo-img"
            />
          </a>
        </div>

        <nav>
          <ul class="nav-ul">
            <li class="nav-li">
              <a class="nav-link" href="../index.html">Home</a>
            </li>
            <li class="nav-li">
              <a class="nav-link" href="destination.html">Destination</a>
            </li>
            <li class="nav-li">
              <a class="nav-link" href="about.html">About Us</a>
            </li>
            <li class="nav-li">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
          </ul>
          <button id="hamburger" aria-label="Toggle Navigation Menu">
            <span class="bar"></span>
          </button>
        </nav>
      </header>
      <main>
        <section class="contact">
          <form action="process_contact.php" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required />

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required />

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" />

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <div class="form-group">
              <button type="submit">Submit</button>
            </div>
          </form>
        </section>
      </main>

      <footer>
        <div class="social-media">
          <i class="fab fa-facebook-square"></i>
          <i class="fab fa-twitter"></i>
          <i class="fab fa-instagram-square"></i>
        </div>
        <div class="contact-info">
          <p>Email: info@traveler.com</p>
          <p>Phone: +1 (555) 123-4567</p>
        </div>
        <nav class="footer-nav">
          <ul class="footer-ul">
            <li class="footer-li">
              <a class="footer-link" href="#">Terms of Service</a>
            </li>
            <li class="footer-li">
              <a class="footer-link" href="#">Privacy Policy</a>
            </li>
            <li class="footer-li"><a class="footer-link" href="#">FAQs</a></li>
          </ul>
        </nav>
      </footer>
      <script src="../js/script.js"></script>
    </div>
  </body>
</html>
